{{define "profile_dialog"}}
<div id="profile-dialog" data-show="$showProfile">
<div class="dialog-overlay" data-on:click="$showProfile = false"></div>
<div class="dialog">
  <h3>{{T .Locale "profile"}}</h3>
  <div id="profile-dialog-alert"></div>
  <form data-on:submit="@post('/profile')">
    <div class="form-group">
      <label for="username">{{T .Locale "username"}}</label>
      <input type="text" id="username" name="username" value="{{.Username}}" required minlength="2" maxlength="50">
    </div>
    <div class="form-group">
      <label for="first_name">{{T .Locale "first_name"}}</label>
      <input type="text" id="first_name" name="first_name" value="{{.FirstName}}">
    </div>
    <div class="form-group">
      <label for="last_name">{{T .Locale "last_name"}}</label>
      <input type="text" id="last_name" name="last_name" value="{{.LastName}}">
    </div>
    <div class="form-group">
      <label for="email">{{T .Locale "email"}}</label>
      <input type="email" id="email" name="email" value="{{.Email}}">
    </div>
    <div class="form-group">
      <label for="preferred_language">{{T .Locale "language"}}</label>
      <select id="preferred_language" name="preferred_language">
        <option value="en" {{if eq .PreferredLanguage "en"}}selected{{end}}>{{T .Locale "lang_en"}}</option>
        <option value="fr" {{if eq .PreferredLanguage "fr"}}selected{{end}}>{{T .Locale "lang_fr"}}</option>
        <option value="it" {{if eq .PreferredLanguage "it"}}selected{{end}}>{{T .Locale "lang_it"}}</option>
      </select>
    </div>
    <div class="dialog-actions">
      <button type="button" data-on:click="$showProfile = false" class="btn-outline">{{T .Locale "cancel"}}</button>
      <button type="submit" class="btn-primary">{{T .Locale "save"}}</button>
    </div>
  </form>
</div>
</div>
{{end}}
