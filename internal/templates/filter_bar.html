<div id="filter-bar" class="filter-bar">
<div class="filter-row">
   <select data-bind:feedFilter data-on:change="@get('/entries?v={{version}}')" class="filter-select">
    <option value="">{{T .Locale "all_feeds"}}</option>
    {{range .Feeds}}
    <option value="{{.ID}}">{{.Title}}</option>
    {{end}}
  </select>
  <input type="date" data-bind:dateFrom data-on:change="@get('/entries?v={{version}}')" class="filter-date" placeholder="{{T .Locale "from"}}">
  <input type="date" data-bind:dateTo data-on:change="@get('/entries?v={{version}}')" class="filter-date" placeholder="{{T .Locale "to"}}">
</div>
<div class="filter-row filter-actions">
  <button data-on:click="@post('/entries/refresh-all')" class="btn-outline btn-sm">{{T .Locale "refresh_all"}}</button>
  <button data-on:click="@post('/entries/clear-selection')" class="btn-outline btn-sm">{{T .Locale "clear_selection"}}</button>
  <button data-on:click="$showExport = true" class="btn-primary btn-sm">{{T .Locale "export_selected"}}</button>
   {{if .SelectedCount}}<span class="selected-count">{{T .Locale "selected_count" .SelectedCount}}</span>{{end}}
</div>
</div>
