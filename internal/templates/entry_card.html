{{define "entry_card"}}
<div class="entry-card{{if .IsSelected}} selected{{end}}">
   <div class="entry-title-row">
     <button data-on:click="@post('/entries/{{.Entry.ID}}/toggle-select')" class="btn-icon" title="{{T .Locale "toggle_select"}}">
       {{if .IsSelected}}<span>☑</span>{{else}}<span>☐</span>{{end}}
     </button>
     <h3 class="entry-title">
       <a href="{{.Entry.URL}}" target="_blank" rel="noopener">{{.Entry.Title}}</a>
     </h3>
   </div>
   {{if .Entry.Summary}}<div class="entry-chapo">{{safeHTML .Entry.Summary}}</div>{{end}}
   <div class="entry-footer">
     <span class="entry-date">{{formatTime .Entry.PublishedAt .Locale}}</span>
     <span class="entry-feed">{{.Entry.FeedTitle}}</span>
   </div>
</div>
{{end}}
