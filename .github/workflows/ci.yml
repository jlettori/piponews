name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Build
        run: go build -o /dev/null .

      - name: Test with coverage
        run: go test -coverprofile=coverage.out -count=1 ./...

      - name: Extract coverage percentage
        id: extract
        run: |
          echo "total=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')" >> $GITHUB_OUTPUT

      - name: Determine badge color
        id: color
        run: |
          pct=${{ steps.extract.outputs.total }}
          if (( $(echo "$pct >= 80" | bc -l) )); then
            echo "color=25A162" >> $GITHUB_OUTPUT
          elif (( $(echo "$pct >= 60" | bc -l) )); then
            echo "color=DAA520" >> $GITHUB_OUTPUT
          else
            echo "color=DC3545" >> $GITHUB_OUTPUT
          fi

      - name: Print coverage
        run: echo "coverage=${{ steps.extract.outputs.total }}%" >> $GITHUB_STEP_SUMMARY
